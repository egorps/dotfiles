# ──────────────────────────────────────────────
#  Prefix
# ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ──────────────────────────────────────────────
#  General
# ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g history-limit 50000
set -g base-index 1              # windows start at 1
setw -g pane-base-index 1        # panes start at 1
set -g renumber-windows on       # renumber after closing
set -sg escape-time 0            # no delay after escape
set -g focus-events on           # for vim autoread
set -g set-clipboard on

# ──────────────────────────────────────────────
#  Key Bindings
# ──────────────────────────────────────────────

# reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# splits — open in current path
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# new window in current path
bind c new-window -c "#{pane_current_path}"

# pane navigation — hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# pane resizing — prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# window navigation — prefix + n/p or Shift+Arrow
bind -n S-Left  previous-window
bind -n S-Right next-window

# swap windows with < and >
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1

# ──────────────────────────────────────────────
#  Vi Copy Mode
# ──────────────────────────────────────────────
setw -g mode-keys vi
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send -X rectangle-toggle

# mouse drag copies to system clipboard
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# ──────────────────────────────────────────────
#  Notifications
# ──────────────────────────────────────────────
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# ──────────────────────────────────────────────
#  Catppuccin Mocha Theme
# ──────────────────────────────────────────────
# Colors: Catppuccin Mocha palette (inline — hex values used directly below)
# peach=#fab387  blue=#89b4fa  mauve=#cba6f7  green=#a6e3a1
# text=#cdd6f4  surface0=#313244  surface1=#45475a  surface2=#585b70
# mantle=#181825  base=#1e1e2e

# ── Pane borders ──
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#fab387"

# ── Status bar ──
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#181825,fg=#cdd6f4"

# left: session name in powerline segment
set -g status-left-length 40
set -g status-left "#[bg=#313244,fg=#cdd6f4,bold]  #S #[bg=#181825,fg=#313244]"

# right: date + time in powerline segments (matches starship order)
set -g status-right-length 60
set -g status-right "#[fg=#89b4fa]#[bg=#89b4fa,fg=#181825]  %Y-%m-%d #[fg=#cba6f7,bg=#89b4fa]#[bg=#cba6f7,fg=#181825]  %H:%M #[fg=#cba6f7,bg=#181825]"

# window tabs
set -g window-status-separator ""
setw -g window-status-format "#[fg=#181825,bg=#45475a]#[fg=#cdd6f4,bg=#45475a] #I  #W #[fg=#45475a,bg=#181825]"
setw -g window-status-current-format "#[fg=#181825,bg=#fab387]#[fg=#181825,bg=#fab387,bold] #I  #W #[fg=#fab387,bg=#181825]"

# ── Messages & modes ──
set -g message-style "bg=#313244,fg=#fab387"
set -g message-command-style "bg=#313244,fg=#fab387"
setw -g mode-style "bg=#585b70,fg=#cdd6f4,bold"
setw -g clock-mode-colour "#fab387"
